version: "3.9"

services:
  # ─── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - pam_net
    restart: unless-stopped

  # ─── React frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_URL=http://localhost/api
    networks:
      - pam_net
    depends_on:
      - backend
    restart: unless-stopped

  # ─── FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://pam_user:pam_pass@postgres:5432/pam_db
      - REDIS_URL=redis://redis:6379/0
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root-dev-token
      - SECRET_KEY=changeme-in-production-use-32-char-secret
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pam_net
    restart: unless-stopped

  # ─── Celery worker (TTL revocation) ──────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://pam_user:pam_pass@postgres:5432/pam_db
      - REDIS_URL=redis://redis:6379/0
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root-dev-token
      - SECRET_KEY=changeme-in-production-use-32-char-secret
    depends_on:
      - backend
      - redis
      - vault
    networks:
      - pam_net
    restart: unless-stopped

  # ─── Celery beat scheduler ────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://pam_user:pam_pass@postgres:5432/pam_db
      - REDIS_URL=redis://redis:6379/0
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root-dev-token
      - SECRET_KEY=changeme-in-production-use-32-char-secret
    depends_on:
      - redis
    networks:
      - pam_net
    restart: unless-stopped

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=pam_user
      - POSTGRES_PASSWORD=pam_pass
      - POSTGRES_DB=pam_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pam_user -d pam_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pam_net
    restart: unless-stopped

  # ─── HashiCorp Vault (dev mode) ───────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root-dev-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - ./vault/config:/vault/config:ro
      - vault_data:/vault/data
    command: vault server -dev -dev-root-token-id=root-dev-token -dev-listen-address=0.0.0.0:8200
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pam_net
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pam_net
    restart: unless-stopped

  # ─── Vault setup (one-shot init) ─────────────────────────────────────────
  vault_setup:
    image: hashicorp/vault:1.16
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root-dev-token
    volumes:
      - ./scripts/vault_init.sh:/vault_init.sh:ro
    entrypoint: ["/bin/sh", "/vault_init.sh"]
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - pam_net
    restart: "no"

volumes:
  postgres_data:
  vault_data:
  redis_data:

networks:
  pam_net:
    driver: bridge
